      ABC da Amazônia, Jacaré-açu.
      Quando cai a noite na floresta, imagens que parecem luzes de uma cidade. São os olhos de um temido predador, o Jacaré-açu. É a maior espécie de jacaré da Amazônia. Em alguns lugares, é possível encontrar exemplares com mais de seis metros de comprimento e 300 kg.
      Considerado mais pacífico que o crocodilo africano, pode se tornar feroz quando ameaçado. 
      É difícil capturar o vivo, como mostra esse grupo de cientistas que tenta levar o animal para estudos em laboratório. O maior risco à sobrevivência do jacaré-açu na natureza é a intensa perseguição de caçadores, atraídos pelo alto valor do seu couro e o sabor de sua carne.
      ABC da Amazônia, oferecimento: 
      Banco do Planeta, inovando na conservação da Amazônia.
      E Natura Ekos, siga sua sabedoria.





