    transcricao: |
      Eles vivem na região amazônica no estado do Maranhão. Um dos últimos povos semi-nômades do mundo, os Awá-guajás sempre vagaram pela mata sem ter aldeias ou casa fixa. 
      Só há poucos anos, começaram a habitar uma reserva e a conhecer técnicas agrícolas. Mas não abandonaram o costume de sair pela floresta, coletar frutos e caçar. Desde pequenos, os Awá-guajás são treinados para caça, os animais são o principal alimento. Mas na reserva eles têm tratamento especial, porcos do mato, quatis, macacos, preguiças, são criados como se fossem da família.
      E nada é mais comum do que uma cena como esta: a índia amamenta o filho e o macaco ao mesmo tempo.
      ABC da Amazônia, oferecimento:
      Ford Focus, um carro para quem entende de carro.
      E Natura Ekos Açaí, você faz parte dessa história. 

