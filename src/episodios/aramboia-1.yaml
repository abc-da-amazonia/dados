      ABC da Amazônia, Arambóia.
      O nome científico é Corallus caninus, mas essa serpente da região amazônica é mais conhecida por Arambóia, Cobra-papagaio e vários outros nomes. Passa a maior parte do tempo em cima das árvores. 
      Por sua beleza e por não ser venenosa, é procurada por criadores e pessoas que querem um animal de estimação especial.
      Estas imagens foram colhidas num criadouro na Amazônia. Nem sempre o manuseio da Arambóia é tranquilo. A picada não mata, mas deixa marcas de dentes bem afiados.
      ABC da Amazônia, oferecimento:
      Ford Focus, um carro para quem entende de carro.
