      ABC da Amazônia, Boto.
      Dois tipos são encontrados nos rios da Amazônia, o Boto Cinza ou Tucuxi e o vermelho ou boto cor-de-rosa. Os botos se alimentam dos cardumes mais abundantes dos rios e dos peixes mais fracos. Por isso, são considerados importantes para o equilíbrio das espécies. As maiores ameaças aos botos são a pesca predatória e a lenda de que teriam o poder de se transformar em homem e seduzir as mulheres. 
      Muitas pessoas compram partes tiradas do corpo do boto para usar como feitiço nas conquistas amorosas, mas o boto não tem medo de gente, dócil e brincalhão, passou até a fazer parte, nas águas do rio negro, de terapia para criança.
