      ABC da Amazônia, Galo-da-Serra.
      A cor laranja das penas do Galo-da-Serra se destaca na vegetação, é um dos pássaros mais bonitos do Brasil. Ele pode ser encontrado em algumas regiões, como a do município de Presidente Figueiredo no Estado do Amazonas. 
      As fêmeas não tem as cores marcantes dos machos, mas tem um poder de sedução que leva os parceiros a lutarem entre si para chamar sua atenção.
      Os galos da Serra se enfrentam para conquistar a companheira, a briga é pra valer. Chega a durar mais de meia hora, a fêmea acompanha tudo do alto. O combate só termina quando surge um Vencedor.
      ABC da Amazônia, oferecimento:
      Natura Ekos, prepare-se, você nunca viu sobonetes assim.



