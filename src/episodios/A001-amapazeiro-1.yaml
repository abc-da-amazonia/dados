      ABC da Amazônia, Amapazeiro.
      Essa árvore deu nome ao Amapá, é o amapazeiro. Que aparece desenhado com destaque no brasão oficial do Estado. O tronco chega até 35 metros de altura, dele, sai o chamado Leite do Amapá.
      Existem várias espécies da árvore, a mais procurada é a que dá uma seiva amarga usada pela população como remédio para combater várias doenças. O trabalho para extrair o leite do amapazeiro é muito parecido com o de tirar látex da seringueira. Encontrar amapazeiro está cada vez mais difícil, é grande a quantidade de árvores mortas por causa de ferimentos no tronco provocados pelo uso de ferramentas inadequadas na retirada do leite.
      ABC da Amazônia, oferecimento:
      Banco do Planeta, inovando na conservação da Amazônia.
      E Natura Ekos, siga sua sabedoria.
