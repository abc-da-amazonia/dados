      ABC da Amazônia, Beiju.
      Às 6 horas ainda está escuro nesta Aldeia do Xingu, enquanto o pessoal se aquece em volta de uma fogueirinha, as mulheres preparam o beijo, que é a primeira refeição do dia, o café da manhã da tribo. 
      Fazer beiju é tarefa feminina, da menina até a avó. O homem cultiva mandioca.
      Mas, a partir da colheita, as tarefas da roça passam para as mulheres. São elas que carregam as raízes, lavam a mandioca na água corrente dos rios e depois começam a processar o alimento. Primeiro, transformando a mandioca em polvilho, depois o polvilho vira uma massa quentinha. 
      O beiju é o prato principal de todas as aldeias, é o pão do índio, que se come puro ou como sanduíche de peixe.
      ABC da Amazônia, oferecimento:
      Natura Ekos, óleos trifásicos, hidratação 24 horas.
      E Bradesco, presença na Conservação da Amazônia.

