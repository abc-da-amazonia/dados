      ABC da Amazônia, jambu.
      O Jambu ou agrião do Pará, de sabor levemente ácido e picante, essa planta tem um efeito anestésico que deixa a boca levemente adormecida.
      Ela se desenvolve em solos férteis, é exigente em água e sua flor produz muitas sementes.
      Rico em ferro e várias vitaminas, o Jambu é usado na medicina popular ao natural ou em forma de chá, xaropes e tinturas.
      No mercado do Ver-o-Peso em Belém, os consumidores podem encontrar o jambu nas bancas de ervas, raízes e garrafadas.
      Suas folhas e ramos são ingredientes fundamentais em muitas receitas típicas da região Amazônica, principalmente no Estado do Pará, como o Pato no tucupi ou o Tacacá.
      Oferecimento: 
      Natura Ekos, siga sua sabedoria.
      E Banco do Planeta, inovando na conservação da Amazônia.






