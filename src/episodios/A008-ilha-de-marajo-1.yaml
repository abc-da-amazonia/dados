      ABC da Amazônia, Ilha de Marajó.
      Situada na foz do rio Amazonas, a Ilha de Marajó tem uma área equivalente ao estado do Rio de Janeiro. É grande a diversidade de praias, lagos, igarapés e florestas e de espécies animais, como o Guará, ave símbolo de Marajó.
      Entre as riquezas culturais, destacam-se: a cerâmica Marajoara, criada há centenas de anos pelos índios, e a tradicional dança do Carimbó. 
      Na Ilha de Marajó, tem mais búfalo do que gente, é o maior rebanho do Brasil. Além de aproveitar a exuberante natureza, os turistas que visitam a ilha podem também se deliciar com os pratos típicos de uma variada cozinha.
