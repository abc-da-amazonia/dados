      ABC da Amazônia, Pato no Tucupi.
      Comer pato é coisa comum no Pará, e o pato no tucupi está sempre na mesa em dias de festa. É considerado o prato que não pode faltar no sírio de Nazaré, uma das maiores festas religiosas do país.
      Existem muitos criadores de pato no Pará. Alguns apuram a raça a partir de vários cruzamentos, inclusive com patos selvagens. A carne é escura e firme.
      Preparado com vários temperos, o pato é assado, cortado em pedaços e mergulhado no tucupi, um caldo amarelo extraído da mandioca. O último toque vem do jambu, planta picante que provoca ligeira dormência na boca e que faz parte de muitas receitas da cozinha paraense. 
